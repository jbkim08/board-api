server:
  port: 8080

spring:
  application:
    name: board
  # ===== Mysql DB 설정 =====
  datasource:
    url: jdbc:mysql://localhost:3306/board?serverTimezone=Asia/Seoul
    username: root
    password: 1234

  sql:
    init:
      mode: never  # 매번 실행 시 schema.sql / data.sql 자동 실행

# ===== MyBatis 설정 =====
mybatis:
  mapper-locations: classpath:mapper/**/*.xml   # XML 매퍼 위치
  type-aliases-package: com.example.board.domain # alias로 쓸 도메인 패키지
  configuration:
    map-underscore-to-camel-case: true  # DB(snake_case) <-> Java(camelCase) 자동 매핑

# 로그에서 SQL 쿼리 확인하고 싶을 때
logging:
  level:
    com.example.board.mapper: trace