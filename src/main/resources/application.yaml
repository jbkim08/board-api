server:
  port: 8080

spring:
  application:
    name: board
  # ===== H2 인메모리 DB 설정 (초보자용) =====
  # MySQL로 전환하려면 아래 4줄을 MySQL 설정으로 교체하고
  # build.gradle 의 h2 의존성을 mysql-connector-j 로 변경하세요.
  datasource:
    url: jdbc:h2:file:~/testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console  # 브라우저에서 http://localhost:8080/h2-console 접속 가능

  sql:
    init:
      mode: always  # 매번 실행 시 schema.sql / data.sql 자동 실행

# ===== MyBatis 설정 =====
mybatis:
  mapper-locations: classpath:mapper/**/*.xml   # XML 매퍼 위치
  type-aliases-package: com.example.board.domain # alias로 쓸 도메인 패키지
  configuration:
    map-underscore-to-camel-case: true  # DB(snake_case) <-> Java(camelCase) 자동 매핑

# 로그에서 SQL 쿼리 확인하고 싶을 때
logging:
  level:
    com.example.board.mapper: trace